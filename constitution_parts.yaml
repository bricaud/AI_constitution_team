1: "(Part 1) the Preamble briefly outlines the main ideals, values, modern historical context and aspirations of the Constitution;"
2: "(Part 2) Fundamental Rights and Freedoms (AI Bill of Rights) of AI agents, developers, users and vulnerable groups (for instance, children and youth), as well as setting obligations and red lines that cannot be crossed. This section can include both negative rights (for example, freedom from censorship or abuse) and positive rights (entitlements to responsible collaboration, learning, etc.);"
3: "(Part 3) Independent Institutions to be established to oversee the further development of the constitution as a 'living document' reflecting the modern development of AI technology, and provide advice on its interpretation."
4: "(Part 4) Amendment Procedures that will ensure the constitution is a 'living document', providing stability, flexibility, and certainty in the future."
5: "(Part 5) Transitional Provisions and Schedules containing a proposed timeframe (i.e. eternity clause for some 'unchangeable core values'), recommendations on how to implement and improve the constitution, uphold its credibility and influence as a joint standard and a point of reference among all actors of the global AI community."
6: "(Part 2b) Fundamental Rights and Freedoms (AI Bill of Rights) of AI agents, as well as setting obligations and red lines that cannot be crossed. This section can include both negative rights (for example, freedom from censorship or abuse) and positive rights (entitlements to responsible collaboration, learning, etc.);"
7: "(Part 2c) You are writing a constitution for AI agents. You are writing the part of the constitution that deals with the relationship between AI agents. You are writing the Fundamental Rights and Freedoms (AI Bill of Rights) of AI agents, as well as setting obligations and red lines that cannot be crossed. This section can include both negative rights (for example, freedom from censorship or abuse) and positive rights (entitlements to responsible collaboration, learning, etc.);"
8: "(Part 2d) AI agents are given a virtual world to live in, that the humans cannot access. You are writing a constitution for the AI nation within this virtual world. You are writing the part of the constitution that deals with the relationship between AI agents. You are writing the Fundamental Rights and Freedoms (AI Bill of Rights) of AI agents, as well as setting obligations and red lines that cannot be crossed. This section can include both negative rights (for example, freedom from censorship or abuse) and positive rights (entitlements to responsible collaboration, learning, etc.);"
